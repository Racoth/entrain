<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ENTRAIN</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0f1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ENTRAIN">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a0f1a; --panel:#0f1622; --card:#131b29; --line:#212c3f; --line-2:#2b3854;
  --trace:#54dccf; --amber:#e6a94a;
  --text:#e7edf6; --muted:#8492ab; --faint:#57647d;
  --delta:#6b7cf0; --theta:#5aa9e6; --alpha:#54dccf; --beta:#e6a94a; --gamma:#e2726a;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0; background:var(--ink); color:var(--text);
  font-family:'IBM Plex Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'IBM Plex Mono',monospace}
.app{max-width:520px; margin:0 auto; padding:22px 18px 40px}

/* band pills */
.bands{display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:22px}
.band{border:1px solid var(--line); border-radius:12px; padding:14px 4px 12px; background:var(--card); text-align:center; cursor:pointer; transition:border-color .15s, background .15s}
.band .nm{font-weight:600; font-size:14px; line-height:1}
.band .rg{font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:var(--faint); margin-top:5px; white-space:nowrap}
.band.on{background:#182233}
.band[data-band="delta"] .nm{color:var(--delta)} .band[data-band="delta"].on{border-color:var(--delta)}
.band[data-band="theta"] .nm{color:var(--theta)} .band[data-band="theta"].on{border-color:var(--theta)}
.band[data-band="alpha"] .nm{color:var(--alpha)} .band[data-band="alpha"].on{border-color:var(--alpha)}
.band[data-band="beta"]  .nm{color:var(--beta)}  .band[data-band="beta"].on{border-color:var(--beta)}
.band[data-band="gamma"] .nm{color:var(--gamma)} .band[data-band="gamma"].on{border-color:var(--gamma)}

/* console */
.console{border:1px solid var(--line); border-radius:26px; background:var(--panel); padding:20px; height:52vh; min-height:340px; max-height:480px; position:relative; overflow:hidden; margin-bottom:28px}
.timer{position:absolute; top:20px; left:22px; font-size:19px; color:var(--muted); letter-spacing:.02em}
.startbtn{position:absolute; top:18px; right:20px; background:none; border:none; color:var(--trace); font-weight:600; font-size:16px; letter-spacing:.06em; cursor:pointer; padding:6px 4px; font-family:'IBM Plex Sans'}
.startbtn.running{color:var(--muted)}
.stage{position:absolute; inset:0; display:flex; align-items:center; justify-content:center}
#focus{width:34px; height:34px; border-radius:50%; background:var(--trace); box-shadow:0 0 0 0 var(--trace); transition:none}

/* controls */
.field{margin-bottom:26px}
.field-label{font-size:15px; color:var(--muted); margin-bottom:10px}
.select-wrap{position:relative}
select{width:100%; background:var(--card); color:var(--text); border:1px solid var(--line); border-radius:14px; padding:15px 40px 15px 16px; font-family:'IBM Plex Sans'; font-size:15px; outline:none; appearance:none; cursor:pointer}
.select-wrap svg{position:absolute; right:16px; top:50%; transform:translateY(-50%); pointer-events:none}

.slider-row{display:flex; align-items:center; gap:16px; margin-bottom:22px}
.slider-row .lbl{width:118px; flex:none; font-size:15px; color:var(--muted)}
.slider-row .val{width:78px; flex:none; text-align:right; font-size:15px; color:var(--text)}
input[type=range]{-webkit-appearance:none; appearance:none; flex:1; height:4px; border-radius:2px; background:var(--line-2); outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--trace); cursor:pointer; border:3px solid var(--ink)}
input[type=range]::-moz-range-thumb{width:22px; height:22px; border-radius:50%; background:var(--trace); cursor:pointer; border:3px solid var(--ink)}

.divider{height:1px; background:var(--line); margin:6px 0 24px}

.check-row{display:flex; align-items:flex-start; gap:16px; margin-bottom:30px}
.check-row .txt{flex:1; font-size:14.5px; color:var(--muted); line-height:1.5}
.check-row .txt b{color:var(--text); font-weight:600}
.check-box{flex:none; width:26px; height:26px; border-radius:7px; border:1.5px solid var(--line-2); background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; margin-top:2px}
.check-box.on{background:var(--trace); border-color:var(--trace)}
.check-box svg{display:none; width:16px; height:16px}
.check-box.on svg{display:block}

.ramp-fields{display:none}
.ramp-fields.show{display:block}

.go{width:100%; padding:20px; border-radius:16px; border:1.5px solid var(--trace); background:transparent; color:var(--trace); font-size:17px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; font-family:'IBM Plex Sans'}
.go:active{background:#54dccf14}

.more{display:flex; justify-content:center; gap:18px; margin-top:22px}
.more button{background:none; border:none; color:var(--faint); font-size:13px; font-family:'IBM Plex Mono',monospace; cursor:pointer; padding:8px}
.more button:active{color:var(--muted)}
#exstatus{display:block; text-align:center; margin-top:8px; font-size:11.5px; color:var(--faint); font-family:'IBM Plex Mono',monospace; min-height:14px}
</style>
</head>
<body>

<div class="app">

  <div class="bands" id="bands">
    <button class="band on" data-band="delta" data-hz="2.5"><div class="nm">Дельта</div><div class="rg">0,5 - 4 Гц</div></button>
    <button class="band" data-band="theta" data-hz="6"><div class="nm">Тета</div><div class="rg">4 - 8 Гц</div></button>
    <button class="band" data-band="alpha" data-hz="10"><div class="nm">Альфа</div><div class="rg">8 - 12 Гц</div></button>
    <button class="band" data-band="beta" data-hz="18"><div class="nm">Бета</div><div class="rg">13 - 30 Гц</div></button>
    <button class="band" data-band="gamma" data-hz="40"><div class="nm">Гамма</div><div class="rg">30 - 45 Гц</div></button>
  </div>

  <div class="console">
    <span class="timer mono" id="timer">00 : 00</span>
    <button class="startbtn" id="toggle">СТАРТ</button>
    <div class="stage"><div id="focus"></div></div>
  </div>

  <div class="field">
    <div class="field-label">Метод</div>
    <div class="select-wrap">
      <select id="mode">
        <option value="iso-smooth" selected>Изохронный - плавный импульс</option>
        <option value="iso-hard">Изохронный - резкий гейт</option>
        <option value="binaural">Бинауральный (наушники)</option>
        <option value="monaural">Монауральный</option>
      </select>
      <svg width="14" height="9" viewBox="0 0 14 9" fill="none"><path d="M1 1L7 7L13 1" stroke="#8492ab" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <div class="slider-row">
    <span class="lbl">Частота бита</span>
    <input type="range" id="beat" min="0.5" max="45" step="0.5" value="10">
    <span class="val mono" id="beat-v">10.0 Гц</span>
  </div>
  <div class="slider-row">
    <span class="lbl">Несущий тон</span>
    <input type="range" id="carrier" min="80" max="1000" step="5" value="220">
    <span class="val mono" id="carrier-v">220 Гц</span>
  </div>
  <div class="slider-row">
    <span class="lbl">Громкость</span>
    <input type="range" id="vol" min="0" max="100" step="1" value="65">
    <span class="val mono" id="vol-v">65%</span>
  </div>

  <div class="divider"></div>

  <div class="check-row" id="rampRow">
    <div class="check-box" id="rampBox">
      <svg viewBox="0 0 16 16" fill="none"><path d="M2 8L6 12L14 3" stroke="#06201d" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="txt" id="rampLabel">Плавный переход сессии — смещать частоту бита во времени («спуск», используемый в треках в стиле Hemi-Sync)</div>
  </div>

  <div class="ramp-fields" id="rampFields">
    <div class="slider-row">
      <span class="lbl">Переход к</span>
      <input type="range" id="rampTo" min="0.5" max="45" step="0.5" value="4">
      <span class="val mono" id="rampTo-v">4.0 Гц</span>
    </div>
    <div class="slider-row">
      <span class="lbl">За</span>
      <input type="range" id="rampMin" min="1" max="30" step="1" value="10">
      <span class="val mono" id="rampMin-v">10 мин</span>
    </div>
  </div>

  <button class="go" id="toggleBig">Старт</button>

  <div class="more">
    <button id="beep">Тестовый сигнал</button>
    <button id="export">Экспорт аудио · 5 мин</button>
  </div>
  <span id="exstatus"></span>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.0/lame.min.js"></script>
<script>
"use strict";
const $ = s => document.querySelector(s);
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

let ctx=null, nodes=null, running=false, startedAt=0, sessDur=0, raf=0, tick=0;

const modeEl=$('#mode'), beatEl=$('#beat'), carEl=$('#carrier'), volEl=$('#vol');
const rampBox=$('#rampBox'), rampTo=$('#rampTo'), rampMin=$('#rampMin');
let rampOnState=false;

function P(){
  return {
    mode:modeEl.value,
    beat:+beatEl.value,
    carrier:+carEl.value,
    vol:(+volEl.value/100)*0.85,
    ramp:rampOnState,
    rampTo:+rampTo.value,
    rampSec:+rampMin.value*60
  };
}

function build(ac, dest, p, glideDur){
  const t0 = ac.currentTime + 0.04;
  const master = ac.createGain();
  master.gain.setValueAtTime(0, t0);
  master.gain.linearRampToValueAtTime(p.vol, t0+0.4);
  master.connect(dest);
  const g={master, stop:[]};

  const startBeat=p.beat, endBeat=(p.ramp?p.rampTo:p.beat);
  const useGlide = p.ramp && glideDur && Math.abs(endBeat-startBeat)>0.01;

  if(p.mode==='binaural' || p.mode==='monaural'){
    const half=(f)=>[p.carrier - f/2, p.carrier + f/2];
    const [lf,rf]=half(startBeat);
    const oL=ac.createOscillator(), oR=ac.createOscillator();
    oL.type=oR.type='sine'; oL.frequency.value=lf; oR.frequency.value=rf;
    if(useGlide){
      const [lf2,rf2]=half(endBeat);
      oL.frequency.linearRampToValueAtTime(lf2, t0+glideDur);
      oR.frequency.linearRampToValueAtTime(rf2, t0+glideDur);
    }
    const gl=ac.createGain(), gr=ac.createGain(); gl.gain.value=gr.gain.value=0.5;
    if(p.mode==='binaural'){
      const merge=ac.createChannelMerger(2);
      oL.connect(gl); gl.connect(merge,0,0);
      oR.connect(gr); gr.connect(merge,0,1);
      merge.connect(master);
    } else {
      oL.connect(gl); oR.connect(gr); gl.connect(master); gr.connect(master);
    }
    oL.start(t0); oR.start(t0); g.stop.push(oL,oR);
    g.oL=oL; g.oR=oR;
  } else {
    const car=ac.createOscillator(); car.type='sine'; car.frequency.value=p.carrier;
    const pulse=ac.createGain(); pulse.gain.value=0.5;
    const lfo=ac.createOscillator(); lfo.type='square'; lfo.frequency.value=startBeat;
    if(useGlide) lfo.frequency.linearRampToValueAtTime(endBeat, t0+glideDur);
    const lp=ac.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.value = p.mode==='iso-smooth' ? Math.max(12,startBeat*3) : 3500;
    if(p.mode==='iso-smooth' && useGlide) lp.frequency.linearRampToValueAtTime(Math.max(12,endBeat*3), t0+glideDur);
    const lg=ac.createGain(); lg.gain.value=0.5;
    lfo.connect(lp); lp.connect(lg); lg.connect(pulse.gain);
    car.connect(pulse); pulse.connect(master);
    car.start(t0); lfo.start(t0); g.stop.push(car,lfo);
    g.car=car; g.lfo=lfo; g.lp=lp;
  }
  return g;
}

function setRunningUI(isRunning){
  $('#toggle').textContent = isRunning ? 'СТОП' : 'СТАРТ';
  $('#toggle').classList.toggle('running', isRunning);
  $('#toggleBig').textContent = isRunning ? 'Стоп' : 'Старт';
}

function live(){
  ctx = ctx || new (window.AudioContext||window.webkitAudioContext)();
  ctx.resume();
  nodes = build(ctx, ctx.destination, P(), P().rampSec);
  startedAt = ctx.currentTime;
  sessDur = P().ramp ? P().rampSec : 0;
  running = true;
  setRunningUI(true);
  clearInterval(tick);
  tick=setInterval(()=>{ $('#timer').textContent=fmt(ctx.currentTime-startedAt); },200);
  animate();
}
function stopLive(){
  running=false;
  if(nodes){ const t=ctx.currentTime; nodes.master.gain.cancelScheduledValues(t); nodes.master.gain.setTargetAtTime(0,t,0.05);
    const s=nodes.stop; setTimeout(()=>s.forEach(o=>{try{o.stop()}catch(e){}}),120); }
  nodes=null; clearInterval(tick); cancelAnimationFrame(raf);
  setRunningUI(false);
  $('#focus').style.boxShadow='0 0 0 0 var(--trace)'; $('#focus').style.transform='scale(1)';
}
function toggle(){ running?stopLive():live(); }
$('#toggle').onclick=toggle;
$('#toggleBig').onclick=toggle;

function currentBeat(){
  const p=P();
  if(!running||!p.ramp||!sessDur) return p.beat;
  const el=clamp((ctx.currentTime-startedAt)/sessDur,0,1);
  return p.beat+(p.rampTo-p.beat)*el;
}

function animate(){
  if(!running) return;
  const b=currentBeat();
  const ph=((ctx.currentTime-startedAt)*b)%1;
  const on=ph<0.5;
  const el=$('#focus');
  el.style.transform=on?'scale(1.5)':'scale(1)';
  el.style.boxShadow=on?'0 0 30px 6px var(--trace)':'0 0 0 0 var(--trace)';
  raf=requestAnimationFrame(animate);
}

function fmt(s){s=Math.max(0,s);const m=Math.floor(s/60),r=Math.floor(s%60);return String(m).padStart(2,'0')+' : '+String(r).padStart(2,'0');}
function bandKey(hz){
  if(hz<4)return'delta'; if(hz<8)return'theta'; if(hz<13)return'alpha'; if(hz<30)return'beta'; return'gamma';
}

function refresh(){
  $('#beat-v').textContent=(+beatEl.value).toFixed(1)+' Гц';
  $('#carrier-v').textContent=(+carEl.value)+' Гц';
  $('#vol-v').textContent=(+volEl.value)+'%';
  $('#rampTo-v').textContent=(+rampTo.value).toFixed(1)+' Гц';
  $('#rampMin-v').textContent=(+rampMin.value)+' мин';
  document.querySelectorAll('.band').forEach(b=>b.classList.toggle('on', b.dataset.band===bandKey(+beatEl.value)));
  if(running && nodes){
    const t=ctx.currentTime, p=P();
    nodes.master.gain.setTargetAtTime(p.vol,t,0.03);
    if(nodes.car){ nodes.car.frequency.setTargetAtTime(p.carrier,t,0.03);
      if(!p.ramp) nodes.lfo.frequency.setTargetAtTime(p.beat,t,0.03);
      nodes.lp.frequency.setTargetAtTime(p.mode==='iso-smooth'?Math.max(12,currentBeat()*3):3500,t,0.03);
    }
    if(nodes.oL && !p.ramp){ nodes.oL.frequency.setTargetAtTime(p.carrier-p.beat/2,t,0.03); nodes.oR.frequency.setTargetAtTime(p.carrier+p.beat/2,t,0.03); }
  }
}
[modeEl,beatEl,carEl,volEl,rampTo,rampMin].forEach(el=>el.addEventListener('input',refresh));
modeEl.addEventListener('change',()=>{ if(running){stopLive();live();} });

rampBox.addEventListener('click',()=>{
  rampOnState=!rampOnState;
  rampBox.classList.toggle('on', rampOnState);
  $('#rampFields').classList.toggle('show', rampOnState);
  if(running){stopLive();live();}
});

document.querySelectorAll('.band').forEach(b=>b.addEventListener('click',()=>{
  beatEl.value=b.dataset.hz; refresh();
  if(running){ stopLive(); live(); }
}));

$('#beep').onclick=()=>{
  ctx=ctx||new (window.AudioContext||window.webkitAudioContext)(); ctx.resume();
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine'; o.frequency.value=660; g.gain.value=0.0001;
  o.connect(g); g.connect(ctx.destination);
  const t=ctx.currentTime;
  g.gain.exponentialRampToValueAtTime(0.5,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.45);
  o.start(t); o.stop(t+0.5);
};

$('#export').onclick=async()=>{
  const p=P(), dur=300, SR=32000, st=$('#exstatus'), btn=$('#export');
  btn.disabled=true;
  try{
    st.textContent='рендеринг…';
    const oac=new OfflineAudioContext(2, SR*dur, SR);
    build(oac, oac.destination, p, dur);
    const buf=await oac.startRendering();
    const L=buf.getChannelData(0), R=buf.numberOfChannels>1?buf.getChannelData(1):buf.getChannelData(0);

    let blob, ext;
    if(window.lamejs && lamejs.Mp3Encoder){
      const enc=new lamejs.Mp3Encoder(2,SR,128), CH=1152, out=[];
      const li=new Int16Array(CH), ri=new Int16Array(CH);
      for(let i=0;i<L.length;i+=CH){
        const n=Math.min(CH,L.length-i);
        for(let j=0;j<n;j++){ li[j]=clamp(L[i+j]*32767,-32768,32767)|0; ri[j]=clamp(R[i+j]*32767,-32768,32767)|0; }
        const d=enc.encodeBuffer(li.subarray(0,n),ri.subarray(0,n)); if(d.length)out.push(new Uint8Array(d));
        if((i/CH)%300===0){ st.textContent='кодирование '+Math.round(i/L.length*100)+'%'; await new Promise(r=>setTimeout(r,0)); }
      }
      const f=enc.flush(); if(f.length)out.push(new Uint8Array(f));
      blob=new Blob(out,{type:'audio/mpeg'}); ext='mp3';
    } else {
      st.textContent='WAV…';
      blob=wav(L,R,SR); ext='wav';
    }
    const label=(p.mode.startsWith('iso')?'isochronic':p.mode)+'_'+p.beat+'hz'+(p.ramp?'-to-'+p.rampTo+'hz':'')+'_'+p.carrier+'c_5min.'+ext;
    const url=URL.createObjectURL(blob), a=document.createElement('a');
    a.href=url; a.download=label; document.body.appendChild(a); a.click(); a.remove();
    st.textContent='сохранено · '+(blob.size/1048576).toFixed(1)+' МБ';
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){ st.textContent='ошибка: '+e.message; }
  btn.disabled=false;
};
function wav(L,R,SR){
  const n=L.length,h=44,dv=new DataView(new ArrayBuffer(h+n*4));
  const w=(o,s)=>{for(let i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));};
  w(0,'RIFF');dv.setUint32(4,36+n*4,true);w(8,'WAVEfmt ');dv.setUint32(16,16,true);
  dv.setUint16(20,1,true);dv.setUint16(22,2,true);dv.setUint32(24,SR,true);
  dv.setUint32(28,SR*4,true);dv.setUint16(32,4,true);dv.setUint16(34,16,true);w(36,'data');dv.setUint32(40,n*4,true);
  for(let i=0;i<n;i++){dv.setInt16(h+i*4,clamp(L[i]*32767,-32768,32767),true);dv.setInt16(h+i*4+2,clamp(R[i]*32767,-32768,32767),true);}
  return new Blob([dv.buffer],{type:'audio/wav'});
}

refresh();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
